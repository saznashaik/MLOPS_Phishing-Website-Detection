name: MLOps CI/CD Pipeline (Free - Docker Hub + Render)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ============================================================
  # JOB 1: Run the ML Pipeline (train the model)
  # ============================================================
  ml-pipeline:
    name: Run ML Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file from secrets
        run: echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env

      - name: Run data ingestion
        run: python src/data_ingestion.py

      - name: Run data validation
        run: python src/data_validation.py

      - name: Run preprocessing
        run: python src/preprocess.py

      - name: Train model
        run: python src/train.py

      - name: Test API starts correctly
        run: |
          uvicorn app:app --host 0.0.0.0 --port 8000 &
          sleep 6
          curl -f http://localhost:8000/health
          echo "✅ API health check passed"

      # Save trained model so next job can use it
      - name: Upload trained model as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/
            data/processed/
            config/

  # ============================================================
  # JOB 2: Build Docker image and push to Docker Hub (FREE)
  # ============================================================
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    needs: ml-pipeline
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: .

      # Set image tag using Git commit SHA for unique versioning
      - name: Set image tag
        id: set-tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image_tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Image will be tagged: $SHORT_SHA"

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push — tags image with both the commit SHA and "latest"
      # "latest" is what Render will always pull
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/phishing-detection:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/phishing-detection:${{ steps.set-tag.outputs.image_tag }}

      - name: Print image info
        run: |
          echo "✅ Image pushed to Docker Hub"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/phishing-detection:latest"
          echo "Tag:   ${{ steps.set-tag.outputs.image_tag }}"

  # ============================================================
  # JOB 3: Tell Render to pull the new image and redeploy (FREE)
  # ============================================================
  deploy-to-render:
    name: Deploy to Render.com
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Trigger Render deployment
        run: |
          echo "Triggering Render deploy..."
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo ""
          echo "✅ Render deployment triggered!"
          echo "Your API will be live at:"
          echo "https://phishing-detection.onrender.com"
          echo ""
          echo "Note: Free tier spins down after 15 mins of inactivity."
          echo "First request after inactivity takes ~30 seconds to wake up."

      - name: Wait and verify deployment
        run: |
          echo "Waiting 60 seconds for Render to pull image and start..."
          sleep 60
          # Try health check — retry up to 5 times
          for i in 1 2 3 4 5; do
            echo "Health check attempt $i..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://phishing-detection.onrender.com/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API is live and healthy!"
              break
            else
              echo "Status: $STATUS — waiting 30 more seconds..."
              sleep 30
            fi
          done