name: MLOps CI/CD Pipeline (Free - Docker Hub + Render)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ============================================================
  # JOB 1: Run the ML Pipeline (train the model)
  # ============================================================
  ml-pipeline:
    name: Run ML Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file from secrets
        run: echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env

      - name: Run data ingestion
        run: python src/data_ingestion.py

      - name: Run data validation
        run: python src/data_validation.py

      - name: Run preprocessing
        run: python src/data_preprocess.py

      - name: Train model
        run: python src/data_train.py

      - name: Test API starts correctly
        run: |
          uvicorn app:app --host 0.0.0.0 --port 8000 &
          sleep 8
          curl -f http://localhost:8000/health
          echo "API health check passed"

      - name: Upload trained model as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/
            data/processed/
            config/

  # ============================================================
  # JOB 2: Build Docker image and push to Docker Hub (FREE)
  # ============================================================
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    needs: ml-pipeline
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: .

      - name: Set image tag
        id: set-tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image_tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Image will be tagged: $SHORT_SHA"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/phishing-detection:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/phishing-detection:${{ steps.set-tag.outputs.image_tag }}

      - name: Print image info
        run: |
          echo "Image pushed to Docker Hub successfully"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/phishing-detection:latest"
          echo "Tag:   ${{ steps.set-tag.outputs.image_tag }}"

  # ============================================================
  # JOB 3: Tell Render to pull the new image and redeploy (FREE)
  # ============================================================
  deploy-to-render:
    name: Deploy to Render.com
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Trigger Render deployment
        run: |
          echo "Triggering Render deploy..."
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo ""
          echo "Render deployment triggered!"

      - name: Wait and verify deployment
        run: |
          echo "Waiting 90 seconds for Render to pull image and start..."
          sleep 90
          for i in 1 2 3 4 5; do
            echo "Health check attempt $i of 5..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.RENDER_APP_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API is live and healthy!"
              exit 0
            else
              echo "Status: $STATUS — waiting 30 more seconds..."
              sleep 30
            fi
          done
          echo "Warning: Could not verify deployment. Check Render dashboard manually."
          exit 0